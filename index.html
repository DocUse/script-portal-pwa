<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#044ec6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Скрипты">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="description" content="NaimTech | Скрипты обучения. Тренировочный кабинет рекрутера.">
    <title>NaimTech | Скрипты обучения</title>

    <!--
      ICON_VERSION — увеличивай число на 1 каждый раз, когда меняешь
      содержимое icons/icon.svg. Это сбрасывает кеш браузера и TimeWeb CDN.
      Текущая версия используется в обеих ссылках ниже И в manifest.webmanifest.
    -->
    <link rel="manifest" href="./manifest.webmanifest?v=2">
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg?v=2">
    <link rel="apple-touch-icon" href="./icons/icon.svg?v=2">
    <link rel="stylesheet" href="./styles.css">

    <script src="./config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="app">
      <div class="auth-screen">
        <div class="auth-card auth-loading-card">
          <div class="auth-spinner" aria-hidden="true"></div>
          <h1 class="auth-title">Подгружаем скрипты</h1>
          <p class="auth-loading-hint">Процессор уже вспотел…</p>
        </div>
      </div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
